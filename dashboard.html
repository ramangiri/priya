<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="app-page">
    <div class="app-shell">
        <div id="sidebarMount"></div>
        <main class="main">
            <div class="topbar">
                <div style="display:flex;gap:12px;align-items:center"><button id="mobileToggle"
                        class="mobile-toggle">☰</button>
                    <h1 id="pageTitle"></h1>
                </div>
                <div class="top-actions"><a class="btn accent" href="create-payslip.html">Create Payslip</a></div>
            </div>
            <div class="grid cards">
                <div class="card stat">
                    <div class="label">Employees</div>
                    <div class="value" id="employeeCount">0</div>
                </div>
                <div class="card stat">
                    <div class="label">Payslips</div>
                    <div class="value" id="payslipCount">0</div>
                </div>
                <div class="card stat">
                    <div class="label">Months Used</div>
                    <div class="value" id="latestMonthCount">0</div>
                </div>
                <div class="card stat">
                    <div class="label">Total Net Salary</div>
                    <div class="value" id="netTotal">₹ 0</div>
                </div>
            </div>
            <div class="layout-2" style="margin-top:18px">
                <div class="card">
                    <h3 class="form-section-title">Recent Payslips</h3>
                    <div class="table-wrap">
                        <table>
                            <thead>
                                <tr>
                                    <th>Employee</th>
                                    <th>Month</th>
                                    <th>Net Salary</th>
                                    <th>Date</th>
                                </tr>
                            </thead>
                            <tbody id="recentBody"></tbody>
                        </table>
                    </div>
                </div>
                <div class="card">
                    <h3 class="form-section-title">Quick Start</h3>
                    <p class="note">1. Add employee details</p>
                    <p class="note">2. Create payslip</p>
                    <p class="note">3. Preview and download PDF</p>
                    <div class="page-actions"><a class="btn full" href="add-employee.html">Add Employee</a><a
                            class="btn full accent" href="settings.html">Settings</a></div>
                </div>
            </div>
        </main>
    </div>
    <script src="js/app.js"></script>
    <script>initShell('dashboard', 'Dashboard'); initDashboard();</script>
</body>

</html>
