<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payslip History</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="app-shell">
        <div id="sidebarMount"></div>
        <main class="main">
            <div class="topbar">
                <div style="display:flex;gap:12px;align-items:center"><button id="mobileToggle"
                        class="mobile-toggle">☰</button>
                    <h1 id="pageTitle"></h1>
                </div>
            </div>
            <div class="card">
                <div class="toolbar">
                    <div class="field"><label>Search Employee</label><input id="searchName" placeholder="Employee name">
                    </div>
                    <div class="field"><label>Search Month</label><input id="searchMonth" placeholder="August 2025">
                    </div>
                </div>
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>Employee</th>
                                <th>ID</th>
                                <th>Month</th>
                                <th>Net Salary</th>
                                <th>Created</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="historyBody"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
    <script src="js/app.js"></script>
    <script>initShell('history', 'Payslip History'); initHistory();</script>
</body>

</html>
